<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الكاشير</title>
    
    <!-- إضافة مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        /* === ديكورات الخلفية الفخمة === */
        body {
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%) !important;
            background-size: 200% 200% !important;
            animation: gradientMove 10s ease infinite !important;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-decorations {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.6;
            animation: floatShape 8s infinite alternate ease-in-out;
        }
        .shape-1 { width: 400px; height: 400px; background: #d4af37; top: -100px; left: -100px; } 
        .shape-2 { width: 500px; height: 500px; background: #007bff; bottom: -150px; right: -100px; animation-delay: 2s; }
        .shape-3 { width: 300px; height: 300px; background: #dc3545; top: 30%; left: 40%; animation-delay: 4s; opacity: 0.4; }

        @keyframes floatShape {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-40px) scale(1.1); }
        }
        /* ==================================== */

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            transition: background 0.5s ease;
            position: relative;
        }

        .back-btn-main {
            position: fixed; 
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #dc3545;
            color: white;
            border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
        }
        .back-btn-main:hover { background-color: #c82333; transform: scale(1.05); }

        .welcome-text {
            font-size: 5rem;
            color: #ffcc00; 
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.6); 
            font-weight: bold;
            opacity: 0;
            animation: appearGrowShrink 3s ease-in-out forwards;
        }

        @keyframes appearGrowShrink {
            0% { transform: scale(0); opacity: 0; }
            30% { transform: scale(1.2); opacity: 1; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        #main-screen { display: none; gap: 30px; }
        
        .page-screen { 
            display: none; 
            width: 100%; 
            height: 100%; 
            justify-content: flex-start; 
            align-items: center; 
            overflow-y: auto; 
            flex-direction: column; 
            padding-bottom: 50px; 
        }

        .btn {
            padding: 15px 50px;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        }
        .btn.send { background-color: #28a745; }
        .btn.receive { background-color: #007bff; }
        .btn.orders { background-color: #ffc107; color: #000; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

        /* تأثير الوميض لزر الاستلام عند وصول طلب جديد */
        @keyframes pulseAlert {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); background-color: #007bff; }
            50% { transform: scale(1.08); box-shadow: 0 0 25px 12px rgba(220, 53, 69, 0.9); background-color: #dc3545; }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); background-color: #007bff; }
        }
        .pulse-active {
            animation: pulseAlert 0.8s infinite !important;
        }

        /* تأثير التلاشي السلس للكروت */
        .fade-out-anim {
            opacity: 0 !important;
            transform: scale(0.8) !important;
            transition: all 0.4s ease-out !important;
            pointer-events: none;
        }

        .order-container {
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3) !important;
            margin-top: 90px; 
        }
        h2 { text-align: center; color: #333; margin-bottom: 30px; border-bottom: 2px solid #28a745; padding-bottom: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #ddd; }
        .item-name { font-size: 1.3rem; font-weight: bold; color: #444; }
        .quantity-box { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background-color: #007bff; color: white; border: none; border-radius: 6px; width: 40px; height: 40px; font-size: 1.5rem; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .qty-btn.minus { background-color: #dc3545; }
        .quantity-box input { width: 50px; height: 40px; font-size: 1.3rem; text-align: center; border: 1px solid #ccc; border-radius: 6px; pointer-events: none; font-weight: bold; }
        
        .submit-btn { width: 100%; background-color: #28a745; color: #fff; border: none; padding: 15px; font-size: 1.3rem; font-weight: bold; border-radius: 8px; margin-top: 25px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        .submit-btn:hover { transform: scale(1.02); }
        
        .order-item-card { 
            border: 1px solid #ccc; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            color: #222;
            transition: all 0.3s ease; /* لدعم حركة التلاشي */
        }
        
        .qty-highlight {
            display: inline-block;
            background-color: #fff;
            color: #dc3545;
            font-size: 1.4rem;
            font-weight: 900;
            padding: 2px 10px;
            border-radius: 6px;
            border: 2px solid #dc3545;
            margin: 0 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .time-badge {
            background-color: rgba(255,255,255,0.7);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #444;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .receive-btn { background-color: #28a745; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s;}
        .receive-btn:hover { transform: scale(1.02); }
        .cancel-btn { background-color: #dc3545; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s;}
        .cancel-btn:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <!-- ملف الصوت للتنبيه -->
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div class="bg-decorations">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <button id="back-btn-main" class="back-btn-main" onclick="goBack()">رجوع</button>

    <div id="welcome-text" class="welcome-text">العافية</div>

    <div id="main-screen">
        <button class="btn send" onclick="showPage('send-screen')">إرسال</button>
        <!-- زر الاستلام -->
        <button class="btn receive" id="main-receive-btn" onclick="showPage('receive-screen')">استلام</button>
    </div>

    <div id="send-screen" class="page-screen">
        <div class="order-container">
            <h2>إرسال طلب جديد</h2>
            <button class="btn orders" style="width: 100%; margin-bottom: 20px; font-size: 1rem;" onclick="showPage('orders-screen')">عرض الطلبات المسجلة</button>
            
            <div class="item-row">
                <div class="item-name">طبق عادي</div>
                <div class="quantity-box">
                    <button class="qty-btn" onclick="increaseQty('qty1')">+</button>
                    <input type="number" id="qty1" min="0" value="0">
                    <button class="qty-btn minus" onclick="decreaseQty('qty1')">-</button>
                </div>
            </div>
            <div class="item-row">
                <div class="item-name">طبق فنكر</div>
                <div class="quantity-box">
                    <button class="qty-btn" onclick="increaseQty('qty2')">+</button>
                    <input type="number" id="qty2" min="0" value="0">
                    <button class="qty-btn minus" onclick="decreaseQty('qty2')">-</button>
                </div>
            </div>
            <textarea id="notes" style="width:100%; height:80px; margin-top:20px; border-radius:8px; border: 1px solid #ccc; padding: 10px; font-family: inherit; box-sizing: border-box;" placeholder="ملاحظات الطلب..."></textarea>
            <button class="submit-btn" onclick="saveOrder()">إرسال الطلب</button>
        </div>
    </div>

    <div id="orders-screen" class="page-screen">
        <div class="order-container">
            <h2>الطلبات المسجلة</h2>
            <div id="orders-list"></div>
        </div>
    </div>

    <div id="receive-screen" class="page-screen">
        <button class="btn orders" style="position: absolute; top: 20px; left: 20px; font-size: 1rem; padding: 10px 20px;" onclick="showPage('history-screen')">السجل</button>
        
        <div class="order-container">
            <h2>قائمة الاستلام</h2>
            <div id="receive-list"></div>
        </div>
    </div>

    <div id="history-screen" class="page-screen">
        <div class="order-container">
            <h2>السجل</h2>
            <button class="btn" style="width: 100%; margin-bottom: 20px; font-size: 1rem; padding: 10px 20px; background-color: #dc3545; color: white;" onclick="clearHistory()">حذف السجل</button>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBXW3gL4PszJjmgmVVOjkuEqe-WkWHyO60",
            authDomain: "al-bandar-f02f6.firebaseapp.com",
            databaseURL: "https://al-bandar-f02f6-default-rtdb.firebaseio.com",
            projectId: "al-bandar-f02f6",
            storageBucket: "al-bandar-f02f6.firebasestorage.app",
            messagingSenderId: "799678549296",
            appId: "1:799678549296:web:bd1cc0ff99a680eabfccf5",
            measurementId: "G-KRRFC79HC3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let orders = [];
        let historyOrders = []; 
        let pageHistory = ['main-screen'];
        let previousOrdersCount = -1; 

        const cardColors = ['#f8d7da', '#d1ecf1', '#d4edda', '#fff3cd', '#e8daef', '#ffebd7'];

        // مراقبة الطلبات للتحقق من وصول طلب جديد لتشغيل الصوت والوميض
        db.ref('orders').on('value', (snapshot) => {
            let newOrders = snapshot.val() || [];
            
            if (previousOrdersCount !== -1 && newOrders.length > previousOrdersCount) {
                playAlertSound();     
                triggerPulseEffect(); 
            }
            
            previousOrdersCount = newOrders.length;
            orders = newOrders;
            updateVisibleLists();
        });

        db.ref('historyOrders').on('value', (snapshot) => {
            historyOrders = snapshot.val() || [];
            updateVisibleLists();
        });

        setTimeout(function() {
            document.getElementById('welcome-text').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
        }, 3000); 

        // تشغيل الصوت
        function playAlertSound() {
            let sound = document.getElementById('alert-sound');
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(error => {
                    console.log("المتصفح يمنع الصوت التلقائي حتى تتفاعل مع الصفحة", error);
                });
            }
        }

        // تشغيل الوميض
        function triggerPulseEffect() {
            let receiveBtn = document.getElementById('main-receive-btn');
            if (receiveBtn) {
                receiveBtn.classList.add('pulse-active');
                setTimeout(() => {
                    receiveBtn.classList.remove('pulse-active');
                }, 15000);
            }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-screen, #main-screen').forEach(s => s.style.display = 'none');
            document.getElementById(pageId).style.display = 'flex';
            
            pageHistory.push(pageId);
            document.getElementById('back-btn-main').style.display = 'block';
            document.body.style.background = '#ffffff';

            if (pageId === 'receive-screen') {
                let receiveBtn = document.getElementById('main-receive-btn');
                if (receiveBtn) receiveBtn.classList.remove('pulse-active');
            }

            updateVisibleLists();
        }

        function goBack() {
            if (pageHistory.length > 1) {
                pageHistory.pop();
                let prevPage = pageHistory[pageHistory.length - 1];
                document.querySelectorAll('.page-screen, #main-screen').forEach(s => s.style.display = 'none');
                document.getElementById(prevPage).style.display = 'flex';
                
                if (prevPage === 'main-screen') {
                    document.getElementById('back-btn-main').style.display = 'none';
                    document.body.style.background = 'linear-gradient(135deg, #141e30 0%, #243b55 100%)';
                }
            }
        }

        function increaseQty(id) { document.getElementById(id).value = parseInt(document.getElementById(id).value) + 1; }
        function decreaseQty(id) { 
            if (parseInt(document.getElementById(id).value) > 0) 
                document.getElementById(id).value = parseInt(document.getElementById(id).value) - 1; 
        }

        function saveOrder() {
            let q1 = document.getElementById('qty1').value;
            let q2 = document.getElementById('qty2').value;
            let notes = document.getElementById('notes').value;
            let timestamp = new Date().getTime();

            if(q1 == 0 && q2 == 0) { alert("يرجى اختيار طبق واحد على الأقل"); return; }

            orders.push({q1, q2, notes, timestamp});
            db.ref('orders').set(orders); 

            alert("تم تسجيل الطلب!");
            document.getElementById('qty1').value = 0;
            document.getElementById('qty2').value = 0;
            document.getElementById('notes').value = '';
        }

        function timeSince(timestamp) {
            if (!timestamp) return "";
            let diffMins = Math.floor((new Date().getTime() - timestamp) / 60000);
            if (diffMins < 1) return "الآن";
            if (diffMins < 60) return `منذ ${diffMins} دقيقة`;
            let hours = Math.floor(diffMins / 60);
            let mins = diffMins % 60;
            return `منذ ${hours} ساعة${mins > 0 ? ` و ${mins} دقيقة` : ''}`;
        }

        function renderOrders(elementId, isReceive, listArray, isHistory = false) {
            let list = document.getElementById(elementId);
            list.innerHTML = listArray.length === 0 ? '<p style="text-align:center">لا توجد طلبات.</p>' : '';
            
            let totalAllOrders = 0; 

            listArray.forEach((o, index) => {
                let bgColor = cardColors[index % cardColors.length]; 
                let timeText = timeSince(o.timestamp); 

                let receiveHtml = isReceive ? `
                    <div style="display: flex; gap: 10px;">
                        <button class="receive-btn" onclick="receiveOrder(${index})">استلم</button>
                        <button class="cancel-btn" onclick="cancelOrder(${index})">إلغاء</button>
                    </div>
                ` : '';

                let priceHtml = '';
                if (isHistory) {
                    let q1Count = parseInt(o.q1) || 0;
                    let q2Count = parseInt(o.q2) || 0;
                    
                    let orderTotalPrice = (q1Count * 2000) + (q2Count * 1000);
                    totalAllOrders += orderTotalPrice;
                    
                    priceHtml = `
                        <div style="margin-top: 15px; padding-top: 10px; border-top: 2px dashed #ccc; font-size: 1.3rem; font-weight: bold; color: #198754;">
                            سعر الطلب: ${orderTotalPrice.toLocaleString()} دينار
                        </div>
                    `;
                }

                // تم إضافة ID خاص بكل كارت لتسهيل حركة التلاشي
                list.innerHTML += `
                    <div id="${elementId}-card-${index}" class="order-item-card" style="background-color: ${bgColor};">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <strong style="font-size: 1.2rem;">طلب رقم ${index + 1}</strong>
                            ${timeText ? `<span class="time-badge">⏱️ ${timeText}</span>` : ''}
                        </div>
                        <div style="font-size: 1.2rem; font-weight: bold; margin: 15px 0;">
                            طبق عادي: <span class="qty-highlight">${o.q1}</span> 
                            <br><br>
                            طبق فنكر: <span class="qty-highlight">${o.q2}</span>
                        </div>
                        <em style="color: #444;">الملاحظات: ${o.notes || 'لا توجد'}</em>
                        ${priceHtml}
                        ${receiveHtml}
                    </div>`;
            });

            if (isHistory && listArray.length > 0) {
                list.innerHTML += `
                    <div style="background-color: #198754; color: white; padding: 15px; border-radius: 12px; text-align: center; font-size: 1.5rem; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                        المجموع الكلي للطلبات: ${totalAllOrders.toLocaleString()} دينار
                    </div>
                `;
            }
        }

        function updateVisibleLists() {
            let currentPage = pageHistory[pageHistory.length - 1];
            if(currentPage === 'orders-screen') renderOrders('orders-list', false, orders, false);
            if(currentPage === 'receive-screen') renderOrders('receive-list', true, orders, false);
            if(currentPage === 'history-screen') renderOrders('history-list', false, historyOrders, true);
        }

        setInterval(() => {
            updateVisibleLists();
        }, 60000);

        // تعديل دالة الاستلام لإضافة التلاشي
        function receiveOrder(index) {
            let card = document.getElementById(`receive-list-card-${index}`);
            if (card) {
                card.classList.add('fade-out-anim'); // تفعيل التلاشي
                setTimeout(() => {
                    processReceive(index);
                }, 400); // الانتظار 400 مللي ثانية
            } else {
                processReceive(index);
            }
        }

        function processReceive(index) {
            let completedOrder = orders.splice(index, 1)[0]; 
            historyOrders.push(completedOrder);
            
            db.ref('orders').set(orders); 
            db.ref('historyOrders').set(historyOrders); 
            
            updateVisibleLists();
        }

        // تعديل دالة الإلغاء لإضافة التلاشي
        function cancelOrder(index) {
            let card = document.getElementById(`receive-list-card-${index}`);
            if (card) {
                card.classList.add('fade-out-anim'); // تفعيل التلاشي
                setTimeout(() => {
                    processCancel(index);
                }, 400); 
            } else {
                processCancel(index);
            }
        }

        function processCancel(index) {
            orders.splice(index, 1); 
            db.ref('orders').set(orders); 
            updateVisibleLists();
        }

        function clearHistory() {
            let pass = prompt("الرجاء إدخال الرمز السري لحذف السجل:");
            if (pass === "2006") {
                historyOrders = []; 
                db.ref('historyOrders').set(historyOrders); 
                alert("تم حذف السجل بنجاح!");
            } else if (pass !== null) {
                alert("الرمز السري غير صحيح!");
            }
        }
    </script>
</body>
</html>
