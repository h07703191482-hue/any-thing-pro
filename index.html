<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الكاشير</title>
    
    <!-- إضافة مكتبات Firebase (متوافقة مع كودك المباشر) -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        /* === ديكورات الخلفية الفخمة الجديدة === */
        body {
            /* إجبار الخلفية على البقاء فخمة وعدم تغيرها عبر الجافاسكربت */
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%) !important;
            background-size: 200% 200% !important;
            animation: gradientMove 10s ease infinite !important;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* الكرات المضيئة في الخلفية */
        .bg-decorations {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.6;
            animation: floatShape 8s infinite alternate ease-in-out;
        }
        .shape-1 { width: 400px; height: 400px; background: #d4af37; top: -100px; left: -100px; } /* لون ذهبي */
        .shape-2 { width: 500px; height: 500px; background: #007bff; bottom: -150px; right: -100px; animation-delay: 2s; }
        .shape-3 { width: 300px; height: 300px; background: #dc3545; top: 30%; left: 40%; animation-delay: 4s; opacity: 0.4; }

        @keyframes floatShape {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-40px) scale(1.1); }
        }
        /* ==================================== */

        /* إعدادات الصفحة الأساسية */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            transition: background 0.5s ease;
            position: relative;
        }

        /* زر الرجوع */
        .back-btn-main {
            position: fixed; /* تم تعديله ليكون ثابتاً فوق كل شيء */
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #dc3545;
            color: white;
            border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
        }
        .back-btn-main:hover { background-color: #c82333; transform: scale(1.05); }

        /* حركة كلمة الترحيب */
        .welcome-text {
            font-size: 5rem;
            color: #ffcc00; 
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.6); 
            font-weight: bold;
            opacity: 0;
            animation: appearGrowShrink 3s ease-in-out forwards;
        }

        @keyframes appearGrowShrink {
            0% { transform: scale(0); opacity: 0; }
            30% { transform: scale(1.2); opacity: 1; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* الشاشات */
        #main-screen { display: none; gap: 30px; }
        
        /* === حل المشكلة: إزالة التوسيط العمودي للسماح بظهور الطلبات الأولى بشكل صحيح === */
        .page-screen { 
            display: none; 
            width: 100%; 
            height: 100%; 
            justify-content: flex-start; /* تم تغييره من center لمنع قص الشاشة من الأعلى */
            align-items: center; 
            overflow-y: auto; 
            flex-direction: column; 
            padding-bottom: 50px; /* مسافة إضافية في الأسفل */
        }

        .btn {
            padding: 15px 50px;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        }
        .btn.send { background-color: #28a745; }
        .btn.receive { background-color: #007bff; }
        .btn.orders { background-color: #ffc107; color: #000; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

        /* تنسيق صفحة الإرسال والطلبات */
        .order-container {
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3) !important;
            margin-top: 90px; /* مسافة من الأعلى لكي لا يغطي زر الرجوع على المحتوى */
        }
        h2 { text-align: center; color: #333; margin-bottom: 30px; border-bottom: 2px solid #28a745; padding-bottom: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #ddd; }
        .item-name { font-size: 1.3rem; font-weight: bold; color: #444; }
        .quantity-box { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background-color: #007bff; color: white; border: none; border-radius: 6px; width: 40px; height: 40px; font-size: 1.5rem; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .qty-btn.minus { background-color: #dc3545; }
        .quantity-box input { width: 50px; height: 40px; font-size: 1.3rem; text-align: center; border: 1px solid #ccc; border-radius: 6px; pointer-events: none; font-weight: bold; }
        .submit-btn { width: 100%; background-color: #28a745; color: #fff; border: none; padding: 15px; font-size: 1.3rem; font-weight: bold; border-radius: 8px; margin-top: 25px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        .submit-btn:hover { transform: scale(1.02); }
        
        /* تنسيق قائمة الطلبات */
        .order-item-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: rgba(255, 255, 255, 0.9); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .receive-btn { background-color: #28a745; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s;}
        .receive-btn:hover { transform: scale(1.02); }
        /* زر الإلغاء الجديد */
        .cancel-btn { background-color: #dc3545; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s;}
        .cancel-btn:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <!-- الديكورات الخلفية المضافة -->
    <div class="bg-decorations">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- زر الرجوع -->
    <button id="back-btn-main" class="back-btn-main" onclick="goBack()">رجوع</button>

    <!-- شاشة الترحيب -->
    <div id="welcome-text" class="welcome-text">العافية</div>

    <!-- الشاشة الرئيسية -->
    <div id="main-screen">
        <button class="btn send" onclick="showPage('send-screen')">إرسال</button>
        <button class="btn receive" onclick="showPage('receive-screen')">استلام</button>
    </div>

    <!-- صفحة الإرسال -->
    <div id="send-screen" class="page-screen">
        <div class="order-container">
            <h2>إرسال طلب جديد</h2>
            <button class="btn orders" style="width: 100%; margin-bottom: 20px; font-size: 1rem;" onclick="showPage('orders-screen')">عرض الطلبات المسجلة</button>
            
            <div class="item-row">
                <div class="item-name">طبق عادي</div>
                <div class="quantity-box">
                    <button class="qty-btn" onclick="increaseQty('qty1')">+</button>
                    <input type="number" id="qty1" min="0" value="0">
                    <button class="qty-btn minus" onclick="decreaseQty('qty1')">-</button>
                </div>
            </div>
            <div class="item-row">
                <div class="item-name">طبق فنكر</div>
                <div class="quantity-box">
                    <button class="qty-btn" onclick="increaseQty('qty2')">+</button>
                    <input type="number" id="qty2" min="0" value="0">
                    <button class="qty-btn minus" onclick="decreaseQty('qty2')">-</button>
                </div>
            </div>
            <textarea id="notes" style="width:100%; height:80px; margin-top:20px; border-radius:8px; border: 1px solid #ccc; padding: 10px; font-family: inherit; box-sizing: border-box;" placeholder="ملاحظات الطلب..."></textarea>
            <button class="submit-btn" onclick="saveOrder()">إرسال الطلب</button>
        </div>
    </div>

    <!-- صفحة عرض الطلبات -->
    <div id="orders-screen" class="page-screen">
        <div class="order-container">
            <h2>الطلبات المسجلة</h2>
            <div id="orders-list"></div>
        </div>
    </div>

    <!-- صفحة الاستلام -->
    <div id="receive-screen" class="page-screen">
        <!-- زر السجل -->
        <button class="btn orders" style="position: absolute; top: 20px; left: 20px; font-size: 1rem; padding: 10px 20px;" onclick="showPage('history-screen')">السجل</button>
        
        <div class="order-container">
            <h2>قائمة الاستلام</h2>
            <div id="receive-list"></div>
        </div>
    </div>

    <!-- صفحة السجل -->
    <div id="history-screen" class="page-screen">
        <div class="order-container">
            <h2>السجل</h2>
            
            <!-- زر حذف السجل يظهر الآن بوضوح فوق قائمة سجلات الطلبات -->
            <button class="btn" style="width: 100%; margin-bottom: 20px; font-size: 1rem; padding: 10px 20px; background-color: #dc3545; color: white;" onclick="clearHistory()">حذف السجل</button>
            
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بمشروع البندر
        const firebaseConfig = {
            apiKey: "AIzaSyBXW3gL4PszJjmgmVVOjkuEqe-WkWHyO60",
            authDomain: "al-bandar-f02f6.firebaseapp.com",
            databaseURL: "https://al-bandar-f02f6-default-rtdb.firebaseio.com",
            projectId: "al-bandar-f02f6",
            storageBucket: "al-bandar-f02f6.firebasestorage.app",
            messagingSenderId: "799678549296",
            appId: "1:799678549296:web:bd1cc0ff99a680eabfccf5",
            measurementId: "G-KRRFC79HC3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let orders = [];
        let historyOrders = []; // مصفوفة للسجل
        let pageHistory = ['main-screen'];

        // مزامنة الطلبات اللحظية من Firebase
        db.ref('orders').on('value', (snapshot) => {
            orders = snapshot.val() || [];
            let currentPage = pageHistory[pageHistory.length - 1];
            if(currentPage === 'orders-screen') renderOrders('orders-list', false, orders);
            if(currentPage === 'receive-screen') renderOrders('receive-list', true, orders);
        });

        // مزامنة السجل اللحظي من Firebase
        db.ref('historyOrders').on('value', (snapshot) => {
            historyOrders = snapshot.val() || [];
            let currentPage = pageHistory[pageHistory.length - 1];
            if(currentPage === 'history-screen') renderOrders('history-list', false, historyOrders);
        });

        setTimeout(function() {
            document.getElementById('welcome-text').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
        }, 3000); // 3 ثوانٍ

        function showPage(pageId) {
            document.querySelectorAll('.page-screen, #main-screen').forEach(s => s.style.display = 'none');
            document.getElementById(pageId).style.display = 'flex';
            
            pageHistory.push(pageId);
            document.getElementById('back-btn-main').style.display = 'block';
            document.body.style.background = '#ffffff';

            if(pageId === 'orders-screen') renderOrders('orders-list', false, orders);
            if(pageId === 'receive-screen') renderOrders('receive-list', true, orders);
            if(pageId === 'history-screen') renderOrders('history-list', false, historyOrders);
        }

        function goBack() {
            if (pageHistory.length > 1) {
                pageHistory.pop();
                let prevPage = pageHistory[pageHistory.length - 1];
                document.querySelectorAll('.page-screen, #main-screen').forEach(s => s.style.display = 'none');
                document.getElementById(prevPage).style.display = 'flex';
                
                if (prevPage === 'main-screen') {
                    document.getElementById('back-btn-main').style.display = 'none';
                    document.body.style.background = 'linear-gradient(45deg, #a8edea 0%, #fed6e3 100%)';
                }
            }
        }

        function increaseQty(id) { document.getElementById(id).value = parseInt(document.getElementById(id).value) + 1; }
        function decreaseQty(id) { 
            if (parseInt(document.getElementById(id).value) > 0) 
                document.getElementById(id).value = parseInt(document.getElementById(id).value) - 1; 
        }

        function saveOrder() {
            let q1 = document.getElementById('qty1').value;
            let q2 = document.getElementById('qty2').value;
            let notes = document.getElementById('notes').value;

            if(q1 == 0 && q2 == 0) { alert("يرجى اختيار طبق واحد على الأقل"); return; }

            orders.push({q1, q2, notes});
            db.ref('orders').set(orders); // حفظ الطلب في Firebase

            alert("تم تسجيل الطلب!");
            document.getElementById('qty1').value = 0;
            document.getElementById('qty2').value = 0;
            document.getElementById('notes').value = '';
        }

        function renderOrders(elementId, isReceive, listArray) {
            let list = document.getElementById(elementId);
            list.innerHTML = listArray.length === 0 ? '<p style="text-align:center">لا توجد طلبات.</p>' : '';
            
            listArray.forEach((o, index) => {
                // إضافة زر الإلغاء بجانب زر الاستلام وتوزيعهم بشكل متساوٍ
                let receiveHtml = isReceive ? `
                    <div style="display: flex; gap: 10px;">
                        <button class="receive-btn" onclick="receiveOrder(${index})">استلم</button>
                        <button class="cancel-btn" onclick="cancelOrder(${index})">إلغاء</button>
                    </div>
                ` : '';
                list.innerHTML += `
                    <div class="order-item-card">
                        <strong>طلب رقم ${index + 1}</strong><br>
                        طبق عادي: ${o.q1} | طبق فنكر: ${o.q2}<br>
                        <em>الملاحظات: ${o.notes || 'لا توجد'}</em>
                        ${receiveHtml}
                    </div>`;
            });
        }

        function receiveOrder(index) {
            let completedOrder = orders.splice(index, 1)[0]; // نقل الطلب
            historyOrders.push(completedOrder);
            
            // تحديث القوائم في Firebase
            db.ref('orders').set(orders); 
            db.ref('historyOrders').set(historyOrders); 
            
            renderOrders('receive-list', true, orders);
        }

        // دالة إلغاء الطلب الجديدة
        function cancelOrder(index) {
            orders.splice(index, 1); // حذف الطلب تماماً من قائمة الطلبات
            db.ref('orders').set(orders); // تحديث القائمة في قاعدة البيانات
            // لا نضيف الطلب لمصفوفة historyOrders لذلك لن يتم تسجيله
            renderOrders('receive-list', true, orders);
        }

        // دالة مسح السجل المبرمجة على الرمز 2006
        function clearHistory() {
            let pass = prompt("الرجاء إدخال الرمز السري لحذف السجل:");
            if (pass === "2006") {
                historyOrders = []; // تصفير المصفوفة
                db.ref('historyOrders').set(historyOrders); // تحديث في Firebase
                alert("تم حذف السجل بنجاح!");
            } else if (pass !== null) {
                alert("الرمز السري غير صحيح!");
            }
        }
    </script>
</body>
</html>
