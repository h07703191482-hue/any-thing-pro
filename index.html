<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>توصيل أي شيء - أم قصر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root { 
          --primary: #3949ab; 
          --gold: #ffc107; 
          --bg-gradient: linear-gradient(-45deg, #f4f7f6, #e8eaf6, #ffffff);
          --text-color: #2d3436;
      }
      
      body { 
          font-family: 'Cairo', sans-serif; 
          background: var(--bg-gradient);
          margin: 0; padding: 0; color: var(--text-color); min-height: 100vh; overflow-x: hidden; 
      }

      /* شاشة الدراجة - تظهر أولاً */
      #splash-screen { 
          position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
          background: #2c3e50; z-index: 99999; 
          display: flex; flex-direction: column; align-items: center; justify-content: center; 
          transition: 0.5s ease-out;
      }

      #app-logo-splash {
          width: 100px; height: 100px; background: white; border-radius: 25px;
          display: flex; align-items: center; justify-content: center;
          font-size: 50px; color: var(--primary);
          box-shadow: 0 10px 20px rgba(0,0,0,0.3);
          transform: scale(0); transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .show-logo { transform: scale(1) !important; }

      .road {
          position: absolute; bottom: 30%; width: 100%; height: 40px; background: #34495e;
          border-top: 3px solid #7f8c8d; border-bottom: 3px solid #7f8c8d;
      }

      .bike {
          position: absolute; bottom: calc(30% + 5px); right: -100px;
          font-size: 50px; color: white; transform: scaleX(1);
          animation: drive 3s linear forwards;
      }

      @keyframes drive {
          0% { right: -100px; }
          100% { right: 110%; }
      }

      /* الشاشات - مخفية افتراضياً */
      .screen { display: none; width: 100%; min-height: 100vh; opacity: 0; transition: 0.4s; }
      
      /* الكلاس الذي يظهر الشاشة */
      .active-screen { display: block !important; opacity: 1 !important; }

      .container { max-width: 450px; margin: auto; padding: 20px; box-sizing: border-box; }
      
      .header-main { 
          background: var(--primary); color: white; padding: 40px 20px; 
          text-align: center; border-radius: 0 0 30px 30px; margin: -20px -20px 20px -20px;
      }

      .select-card { 
          background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; 
          display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
          cursor: pointer;
      }
      .select-card i { font-size: 25px; color: var(--primary); background: #f0f2ff; padding: 15px; border-radius: 12px; }

      .back-btn { background: white; border: none; font-size: 20px; padding: 10px; border-radius: 10px; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body onload="startApp()">

    <div id="splash-screen" onclick="skipSplash()">
      <div id="app-logo-splash"><i class="fas fa-shopping-bag"></i></div>
      <h2 style="color: white; margin-top: 20px;">أي شيء - أم قصر</h2>
      <div class="road"></div>
      <div class="bike"><i class="fas fa-motorcycle"></i></div>
    </div>

    <div id="home-screen" class="screen container">
      <div class="header-main">
        <h1>أهلاً بك ✨</h1>
        <p>اطلب أي شيء من داخل أم قصر</p>
      </div>
      
      <div class="select-card" onclick="showScreen('order-screen')">
        <i class="fas fa-shopping-cart"></i>
        <div><h3>طلب مسواك</h3><p>اطلب غداك أو مسواكك</p></div>
      </div>

      <div class="select-card" onclick="showScreen('tuk-screen')">
        <i class="fas fa-taxi"></i>
        <div><h3>تكتك بلي</h3><p>احجز تكتك الآن</p></div>
      </div>
    </div>

    <div id="order-screen" class="screen container">
        <button class="back-btn" onclick="showScreen('home-screen')"><i class="fas fa-arrow-right"></i> رجوع</button>
        <h2>تفاصيل الطلب 📦</h2>
        <input type="text" placeholder="الاسم" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
        <textarea placeholder="اكتب طلباتك هنا..." style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd;" rows="5"></textarea>
        <button style="width:100%; background:var(--primary); color:white; padding:15px; border:none; border-radius:10px; margin-top:10px; font-weight:bold;">إرسال الطلب</button>
    </div>

    <div id="tuk-screen" class="screen container">
        <button class="back-btn" onclick="showScreen('home-screen')"><i class="fas fa-arrow-right"></i> رجوع</button>
        <h2>حجز تكتك 🚕</h2>
        <p>سيتم تحديد موقعك وإرسال أقرب تكتك.</p>
        <button style="width:100%; background:var(--gold); color:black; padding:15px; border:none; border-radius:10px; font-weight:bold;">احجز الآن</button>
    </div>

    <script>
      function startApp() {
          // إظهار اللوجو بحركة
          setTimeout(() => {
              document.getElementById('app-logo-splash').classList.add('show-logo');
          }, 500);

          // إخفاء الشاشة بعد انتهاء الدراجة (3 ثواني)
          setTimeout(skipSplash, 3500);
      }

      function skipSplash() {
          const splash = document.getElementById('splash-screen');
          if (splash && splash.style.display !== 'none') {
              splash.style.opacity = '0';
              setTimeout(() => {
                  splash.style.display = 'none';
                  showScreen('home-screen'); // إظهار الرئيسية بعد الاختفاء
              }, 500);
          }
      }

      function showScreen(id) {
          // 1. إخفاء كافة الشاشات تماماً
          const screens = document.querySelectorAll('.screen');
          screens.forEach(s => {
              s.classList.remove('active-screen');
              s.style.display = 'none';
          });

          // 2. إظهار الشاشة المطلوبة فقط
          const target = document.getElementById(id);
          if (target) {
              target.style.display = 'block';
              // تأخير بسيط لتفعيل الـ opacity (الأنيميشن)
              setTimeout(() => {
                  target.classList.add('active-screen');
              }, 10);
          }
          window.scrollTo(0,0);
      }
    </script>
</body>
</html>
