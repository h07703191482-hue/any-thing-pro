<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الكاشير</title>
    
    <!-- إضافة مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        /* إعدادات الصفحة الأساسية - خلفية فخمة متحركة */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #141E30, #243B55, #2c3e50, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ديكورات الخلفية (كرات مضيئة عائمة) */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }
        .shape1 { width: 350px; height: 350px; background: #ff416c; top: -5%; left: -5%; animation-delay: 0s; }
        .shape2 { width: 450px; height: 450px; background: #00b4db; bottom: -10%; right: -5%; animation-delay: 2s; }
        .shape3 { width: 300px; height: 300px; background: #fdfc47; top: 40%; left: 50%; transform: translate(-50%, -50%); animation-delay: 4s; opacity: 0.3; }

        @keyframes float { 
            0% { transform: translateY(0) scale(1); } 
            100% { transform: translateY(-30px) scale(1.1); } 
        }

        /* زر الرجوع */
        .back-btn-main {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 25px;
            background: rgba(220, 53, 69, 0.8);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        .back-btn-main:hover { background: rgba(220, 53, 69, 1); transform: translateY(-2px); }

        /* حركة كلمة الترحيب */
        .welcome-text {
            font-size: 5rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.5), 0 0 40px #ff416c;
            font-weight: bold;
            opacity: 0;
            animation: appearGrowShrink 3s ease-in-out forwards;
        }

        @keyframes appearGrowShrink {
            0% { transform: scale(0); opacity: 0; }
            30% { transform: scale(1.2); opacity: 1; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* الشاشات */
        #main-screen { display: none; gap: 40px; z-index: 10; }
        .page-screen { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; overflow-y: auto; flex-direction: column; z-index: 10; padding-top: 50px;}

        /* الأزرار الرئيسية */
        .btn {
            padding: 20px 60px;
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .btn.send { background: linear-gradient(135deg, rgba(40, 167, 69, 0.8), rgba(33, 136, 56, 0.8)); }
        .btn.receive { background: linear-gradient(135deg, rgba(0, 123, 255, 0.8), rgba(0, 86, 179, 0.8)); }
        .btn.orders { background: linear-gradient(135deg, rgba(255, 193, 7, 0.8), rgba(224, 168, 0, 0.8)); color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        .btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 15px 35px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.6); }

        /* تنسيق صفحة الإرسال والطلبات (تأثير الزجاج - Glassmorphism) */
        .order-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 550px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-top: 40px;
            margin-bottom: 40px;
        }
        h2 { text-align: center; color: #fff; margin-bottom: 30px; border-bottom: 2px solid #00b4db; padding-bottom: 15px; letter-spacing: 1px; font-size: 2rem;}
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .item-row:last-of-type { border-bottom: none; }
        .item-name { font-size: 1.4rem; font-weight: bold; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        
        .quantity-box { display: flex; align-items: center; gap: 15px; }
        .qty-btn { background: rgba(0, 123, 255, 0.8); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; width: 45px; height: 45px; font-size: 1.8rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .qty-btn:hover { transform: scale(1.1); }
        .qty-btn.minus { background: rgba(220, 53, 69, 0.8); }
        
        .quantity-box input { width: 60px; height: 45px; font-size: 1.5rem; text-align: center; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; background: rgba(0,0,0,0.2); color: white; pointer-events: none; }
        
        textarea {
            width: 100%; height: 90px; margin-top: 20px; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.2); color: #fff;
            padding: 15px; font-size: 1.1rem; box-sizing: border-box;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        textarea::placeholder { color: rgba(255,255,255,0.6); }
        textarea:focus { outline: none; border-color: #00b4db; background: rgba(0, 0, 0, 0.4); }

        .submit-btn { width: 100%; background: linear-gradient(135deg, #28a745, #218838); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 18px; font-size: 1.5rem; font-weight: bold; border-radius: 12px; margin-top: 30px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        
        /* تنسيق قائمة الطلبات */
        .order-item-card { border: 1px solid rgba(255,255,255,0.2); padding: 20px; margin-bottom: 15px; border-radius: 12px; background: rgba(0,0,0,0.3); box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .order-item-card:hover { transform: scale(1.02); background: rgba(0,0,0,0.4); }
        .order-item-card strong { font-size: 1.3rem; color: #00b4db; }
        .receive-btn { background: linear-gradient(135deg, #28a745, #218838); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; font-size: 1.2rem; transition: 0.3s; }
        .receive-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

    </style>
</head>
<body>

    <!-- الديكورات الخلفية -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <!-- زر الرجوع -->
    <button id="back-btn-main" class="back-btn-main" onclick="goBack()">رجوع</button>

    <!-- شاشة الترحيب -->
    <div id="welcome-text" class="welcome-text">العافية</div>

    <!-- الشاشة الرئيسية -->
    <div id="main-screen">
        <button class="btn send" onclick="showPage('send-screen')">إرسال</button>
        <button class="btn receive" onclick="showPage('receive-screen')">استلام</button>
    </div>

    <!-- صفحة الإرسال -->
    <div id="send-screen" class="page-screen">
        <div class="order-container">
            <h2>إرسال طلب جديد</h2>
            <button class="btn orders" style="width: 100%; margin-bottom: 25px; font-size: 1.2rem; padding: 15px;" onclick="showPage('orders-screen')">عرض الطلبات المسجلة</button>
            
            <div class="item-row">
                <div class="item-name">طبق عادي</div>
                <div class="quantity-box">
                    <button class="qty-btn" onclick="increaseQty('qty1')">+</button>
                    <input type="number" id="qty1" min="0" value="0">
                    <button class="qty-btn minus" onclick="decreaseQty('qty1')">-</button>
                </div>
            </div>
            <div class="item-row">
                <div class="item-name">طبق فنكر</div>
                <div class="quantity-box">
                    <button class="qty-btn" onclick="increaseQty('qty2')">+</button>
                    <input type="number" id="qty2" min="0" value="0">
                    <button class="qty-btn minus" onclick="decreaseQty('qty2')">-</button>
                </div>
            </div>
            <textarea id="notes" placeholder="ملاحظات الطلب..."></textarea>
            <button class="submit-btn" onclick="saveOrder()">إرسال الطلب</button>
        </div>
    </div>

    <!-- صفحة عرض الطلبات -->
    <div id="orders-screen" class="page-screen">
        <div class="order-container">
            <h2>الطلبات المسجلة</h2>
            <div id="orders-list"></div>
        </div>
    </div>

    <!-- صفحة الاستلام -->
    <div id="receive-screen" class="page-screen">
        <!-- زر السجل -->
        <button class="btn orders" style="position: absolute; top: 20px; left: 20px; font-size: 1.1rem; padding: 10px 25px;" onclick="showPage('history-screen')">السجل</button>
        
        <div class="order-container">
            <h2>قائمة الاستلام</h2>
            <div id="receive-list"></div>
        </div>
    </div>

    <!-- صفحة السجل -->
    <div id="history-screen" class="page-screen">
        <!-- زر حذف السجل أعلى يسار الشاشة -->
        <button class="btn" style="position: absolute; top: 20px; left: 20px; font-size: 1.1rem; padding: 10px 25px; background: rgba(220, 53, 69, 0.8); color: white; border-color: rgba(255,255,255,0.3);" onclick="clearHistory()">حذف السجل</button>

        <div class="order-container">
            <h2>السجل</h2>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بمشروع البندر
        const firebaseConfig = {
            apiKey: "AIzaSyBXW3gL4PszJjmgmVVOjkuEqe-WkWHyO60",
            authDomain: "al-bandar-f02f6.firebaseapp.com",
            databaseURL: "https://al-bandar-f02f6-default-rtdb.firebaseio.com",
            projectId: "al-bandar-f02f6",
            storageBucket: "al-bandar-f02f6.firebasestorage.app",
            messagingSenderId: "799678549296",
            appId: "1:799678549296:web:bd1cc0ff99a680eabfccf5",
            measurementId: "G-KRRFC79HC3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let orders = [];
        let historyOrders = []; 
        let pageHistory = ['main-screen'];

        // مزامنة الطلبات
        db.ref('orders').on('value', (snapshot) => {
            orders = snapshot.val() || [];
            let currentPage = pageHistory[pageHistory.length - 1];
            if(currentPage === 'orders-screen') renderOrders('orders-list', false, orders);
            if(currentPage === 'receive-screen') renderOrders('receive-list', true, orders);
        });

        // مزامنة السجل
        db.ref('historyOrders').on('value', (snapshot) => {
            historyOrders = snapshot.val() || [];
            let currentPage = pageHistory[pageHistory.length - 1];
            if(currentPage === 'history-screen') renderOrders('history-list', false, historyOrders);
        });

        setTimeout(function() {
            document.getElementById('welcome-text').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
        }, 3000); 

        function showPage(pageId) {
            document.querySelectorAll('.page-screen, #main-screen').forEach(s => s.style.display = 'none');
            document.getElementById(pageId).style.display = 'flex';
            
            pageHistory.push(pageId);
            document.getElementById('back-btn-main').style.display = 'block';

            if(pageId === 'orders-screen') renderOrders('orders-list', false, orders);
            if(pageId === 'receive-screen') renderOrders('receive-list', true, orders);
            if(pageId === 'history-screen') renderOrders('history-list', false, historyOrders);
        }

        function goBack() {
            if (pageHistory.length > 1) {
                pageHistory.pop();
                let prevPage = pageHistory[pageHistory.length - 1];
                document.querySelectorAll('.page-screen, #main-screen').forEach(s => s.style.display = 'none');
                document.getElementById(prevPage).style.display = 'flex';
                
                if (prevPage === 'main-screen') {
                    document.getElementById('back-btn-main').style.display = 'none';
                }
            }
        }

        function increaseQty(id) { document.getElementById(id).value = parseInt(document.getElementById(id).value) + 1; }
        function decreaseQty(id) { 
            if (parseInt(document.getElementById(id).value) > 0) 
                document.getElementById(id).value = parseInt(document.getElementById(id).value) - 1; 
        }

        function saveOrder() {
            let q1 = document.getElementById('qty1').value;
            let q2 = document.getElementById('qty2').value;
            let notes = document.getElementById('notes').value;

            if(q1 == 0 && q2 == 0) { alert("يرجى اختيار طبق واحد على الأقل"); return; }

            orders.push({q1, q2, notes});
            db.ref('orders').set(orders);

            alert("تم تسجيل الطلب!");
            document.getElementById('qty1').value = 0;
            document.getElementById('qty2').value = 0;
            document.getElementById('notes').value = '';
        }

        function renderOrders(elementId, isReceive, listArray) {
            let list = document.getElementById(elementId);
            list.innerHTML = listArray.length === 0 ? '<p style="text-align:center; color:rgba(255,255,255,0.7); font-size:1.2rem;">لا توجد طلبات.</p>' : '';
            
            listArray.forEach((o, index) => {
                let receiveHtml = isReceive ? `<button class="receive-btn" onclick="receiveOrder(${index})">استلم</button>` : '';
                list.innerHTML += `
                    <div class="order-item-card">
                        <strong>طلب رقم ${index + 1}</strong><br><br>
                        طبق عادي: ${o.q1} | طبق فنكر: ${o.q2}<br>
                        <em style="color: #ddd; display:block; margin-top:8px;">الملاحظات: ${o.notes || 'لا توجد'}</em>
                        ${receiveHtml}
                    </div>`;
            });
        }

        function receiveOrder(index) {
            let completedOrder = orders.splice(index, 1)[0]; 
            historyOrders.push(completedOrder);
            
            db.ref('orders').set(orders); 
            db.ref('historyOrders').set(historyOrders); 
            
            renderOrders('receive-list', true, orders);
        }

        function clearHistory() {
            let pass = prompt("الرجاء إدخال الرمز السري لحذف السجل:");
            if (pass === "2006") {
                historyOrders = []; 
                db.ref('historyOrders').set(historyOrders); 
                alert("تم حذف السجل بنجاح!");
            } else if (pass !== null) {
                alert("الرمز السري غير صحيح!");
            }
        }
    </script>
</body>
</html>
